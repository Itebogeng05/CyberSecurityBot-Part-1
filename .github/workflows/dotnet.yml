# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: .NET

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
    - name: Setup MSBuild
      uses: microsoft/setup-msbuild@v1.1
      with:
        dotnet-version: 8.0.x
    - name: Restore dependencies
      run: dotnet restore "CyberSecurityBot Part 1.slnx"
    - name: Build
      run: dotnet build -- configuration Release -- no-restore -- "CyberSecurityBot Part 1.slnx"
    - name: Test
      run: dotnet test --no-build -- logger "trx" --verbosity normal "CyberSecurityBot Part 1.slnx"
